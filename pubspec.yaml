name: flutter_advanced
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.2+1

environment:
  sdk: ^3.8.1

dependencies:
  build_runner: ^2.8.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  # For internationalization and localization
  intl: ^0.20.2
  easy_localization: ^3.0.8
  # State Management  
  flutter_bloc: ^9.1.1
  # For Splash Screen
  flutter_native_splash: ^2.4.6
  # For SVG support
  flutter_svg: ^2.2.0
  # For using immutable classes and union types
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  # Dependency Injection
  get_it: ^8.2.0
  # Code Generation
  json_annotation: ^4.9.0
  json_serializable: ^6.11.0
  # Networking and API calls
  dio: ^5.9.0
  retrofit: ^4.7.2
  retrofit_generator: ^10.0.2
  pretty_dio_logger: ^1.4.0
  # Firebase Dep
  firebase_core: ^4.1.0
  # Flutter plugin for reading and writing simple key-value pairs
  shared_preferences: ^2.5.3
  # Flutter Secure Storage provides API to store data in secure storage.
  flutter_secure_storage: ^9.2.4
  # Easy way to add shimmer effect
  shimmer: ^3.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true
  assets:
    - assets/svgs/
    - assets/images/
